<!DOCTYPE html>
<html>
<head>
    <title>Typography</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .description {
            font-size: 18px;
            font-style: italic;
            font-weight: bold;

            text-align: justify;
            text-transform: capitalize;

            letter-spacing: 2px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <p class="description">
        community events help people connect and learn together.
    </p>
</body>
</html>
