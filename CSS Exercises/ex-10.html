<!DOCTYPE html>
<html>
<head>
    <title>Responsive Design</title>
    <style>
        nav {
            display: flex;
            gap: 20px;
        }
        img {
            width: 30%;
        }
        @media screen and (max-width:768px) {
            nav {
                flex-direction: column;
            }
            img {
                width: 80%;
            }
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">Events</a>
        <a href="#">Contact</a>
    </nav>
    <br>
    <img src="event.png" alt="Image not found">
</body>
</html>
