<!DOCTYPE html>
<html>
<head>
    <title>Links and Lists</title>
    <style>
        a:link {
            color: blue;
        }
        a:hover {
            color: red;
        }
        a:active {
            color: green;
        }
        a:visited {
            color: purple;
        }
        .menu {
            list-style-type: none;
        }
        .menu li {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <ul class="menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Events</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</body>
</html>
