<!DOCTYPE html>
<html>

<head>
    <title>Grid Structure</title>

</head>

<body>
    <div class="container">
        <div class="row mt-5">

            <div class="col-md-4 bg-info p-3">
                First Column
            </div>

            <div class="col-md-4 bg-warning p-3">
                Second Column
            </div>

            <div class="col-md-4 bg-secondary text-white p-3">
                Third Column
            </div>
        </div>
    </div>
</body>

</html>
