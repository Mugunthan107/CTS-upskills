<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <button id="registerBtn">Register</button>
    <div id="eventCard">
        Music Festival
    </div>
    <script>
        $("#registerBtn").click(function () {
            alert("Registered Successfully");
            $("#eventCard").fadeOut(2000);
            setTimeout(function () {
                $("#eventCard").fadeIn(2000);
            }, 2000);
        });
    </script>
</body>
</html>
