<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Gallery</title>
    <style>
        .imageStyle {
            border: 3px solid blue;
            width: 150px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h2>Community Event Gallery</h2>
    <table border="1">
        <tr>
            <td>
                <img src="https://via.placeholder.com/150" alt="Sports" title="Sports Event" class="imageStyle">
                <br>Sports Meet
            </td>
            <td>
                <img src="https://via.placeholder.com/150" alt="Music" title="Music Event" class="imageStyle">
                <br>Music Festival
            </td>

            <td>
                <img src="https://via.placeholder.com/150" alt="Workshop" title="Workshop" class="imageStyle">
                <br>Workshop
            </td>
        </tr>
        <tr>
            <td>
                <img src="https://via.placeholder.com/150" alt="Cultural" title="Cultural Event" class="imageStyle">
                <br>Cultural Day
            </td>
            <td>
                <img src="https://via.placeholder.com/150" alt="Awareness" title="Awareness Program" class="imageStyle">
                <br>Awareness Drive
            </td>
            <td>
                <img src="https://via.placeholder.com/150" alt="Volunteer" title="Volunteer Meet" class="imageStyle">
                <br>Volunteer Meet
            </td>
        </tr>
    </table>
</body>
</html>
