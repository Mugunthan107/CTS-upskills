<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background: yellow;
            padding: 5px;
        }
    </style>
</head>

<body>
    <div id="welcomeBanner">
        Welcome User!
        <span style="color:red;font-weight:bold;">
            Special Offer: Free Registration
        </span>
    </div>
    <p class="highlight">Limited seats available.</p>
    <p class="highlight">Register today.</p>
</body>

</html>
